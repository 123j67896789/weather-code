<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Live SPC + NWS Warning System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
      body {
        margin: 0;
        background: #0b0f14;
        color: white;
        font-family: Arial;
      }
      #map {
        position: absolute;
        inset: 0;
      }

      .sidebar {
        position: absolute;
        top: 15px;
        left: 15px;
        width: 420px;
        background: rgba(15, 20, 25, 0.97);
        padding: 18px;
        border-radius: 16px;
        z-index: 1000;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
        max-height: 90vh;
        overflow: auto;
      }

      .tabs button {
        width: 32%;
        margin-right: 4px;
        margin-bottom: 12px;
        background: #1c2733;
        color: #00bfff;
        border: none;
        padding: 8px;
        border-radius: 8px;
        cursor: pointer;
      }

      .tabs button.active {
        background: #0077ff;
        color: white;
      }

      .section {
        display: none;
      }
      .section.active {
        display: block;
      }

      h2 {
        color: #00bfff;
        margin-top: 0;
      }

      select,
      input,
      textarea,
      button {
        width: 100%;
        margin-bottom: 10px;
        padding: 8px;
        border-radius: 8px;
        border: none;
        background: #1c2733;
        color: white;
      }

      button {
        background: #0077ff;
        cursor: pointer;
      }
      button:hover {
        background: #0099ff;
      }
      .draw-btn {
        background: #444;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <div class="sidebar">
      <div class="tabs">
        <button onclick="showTab('radar')" class="active">Radar</button>
        <button onclick="showTab('nws')">NWS</button>
        <button onclick="showTab('spc')">SPC</button>
      </div>

      <!-- RADAR -->
      <div id="radar" class="section active">
        <h2>Radar</h2>
        <select id="radarProduct">
          <option value="n0q">Base Reflectivity</option>
          <option value="echo">Echo Tops</option>
        </select>
      </div>

      <!-- NWS -->
      <div id="nws" class="section">
        <h2>NWS Warning Issuer</h2>

        <select id="warnType"></select>
        <select id="hazardSelect"></select>

        <textarea
          id="warnDesc"
          placeholder="Full Warning Description..."
        ></textarea>
        <input
          type="number"
          id="warnDuration"
          value="30"
          placeholder="Duration (min)"
        />

        <button class="draw-btn" onclick="startDrawing()">Draw Polygon</button>
        <button onclick="issueNWS()">Issue Warning</button>
      </div>

      <!-- SPC -->
      <div id="spc" class="section">
        <h2>SPC Outlook Issuer</h2>

        <select id="spcRisk">
          <option>TSTM</option>
          <option>Marginal</option>
          <option>Slight</option>
          <option>Enhanced</option>
          <option>Moderate</option>
          <option>High</option>
        </select>

        <textarea id="spcDesc" placeholder="SPC Discussion Text..."></textarea>

        <button class="draw-btn" onclick="startDrawing()">
          Draw Risk Area
        </button>
        <button onclick="issueSPC()">Issue SPC Outlook</button>
      </div>
    </div>

    <script>
      /* ================= MAP ================= */

      const map = L.map("map").setView([39, -95], 5);
      let mapInstance = map;

      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
      ).addTo(map);

      let radarLayer;

      function loadRadar() {
        if (radarLayer) map.removeLayer(radarLayer);
        const product = document.getElementById("radarProduct").value;
        radarLayer = L.tileLayer(
          `https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/nexrad-${product}/{z}/{x}/{y}.png`
        ).addTo(map);
      }
      document.getElementById("radarProduct").onchange = loadRadar;
      loadRadar();

      /* ================= TABS ================= */

      function showTab(id) {
        document
          .querySelectorAll(".section")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        document
          .querySelectorAll(".tabs button")
          .forEach((b) => b.classList.remove("active"));
        event.target.classList.add("active");
      }

      /* ================= HAZARD LOGIC ================= */

      const hazardMap = {
        "Tornado Warning": [
          "Large and Dangerous Tornado",
          "Confirmed Tornado",
          "Tornado Emergency",
        ],
        "Severe Thunderstorm Warning": [
          "80 MPH Winds",
          "Baseball Size Hail",
          "Considerable Damage",
        ],
        "Flash Flood Warning": [
          "Life Threatening Flooding",
          "Rapid Water Rise",
        ],
        "Winter Storm Warning": ["Heavy Snow", "Whiteout Conditions"],
        "Red Flag Warning": ["Extreme Fire Spread"],
      };

      const warnTypeSelect = document.getElementById("warnType");
      Object.keys(hazardMap).forEach((type) => {
        let o = document.createElement("option");
        o.textContent = type;
        warnTypeSelect.appendChild(o);
      });

      function updateHazards() {
        const hazardSelect = document.getElementById("hazardSelect");
        hazardSelect.innerHTML = "";
        hazardMap[warnTypeSelect.value].forEach((h) => {
          let o = document.createElement("option");
          o.textContent = h;
          hazardSelect.appendChild(o);
        });
      }
      warnTypeSelect.onchange = updateHazards;
      updateHazards();

      /* ================= DRAW TOOL ================= */

      let drawing = false;
      let points = [];
      let tempLine;

      function startDrawing() {
        drawing = true;
        points = [];
        if (tempLine) tempLine.remove();
        alert("Click map to add points. Double click to finish.");
      }

      map.on("click", (e) => {
        if (!drawing) return;
        points.push([e.latlng.lat, e.latlng.lng]);
        if (tempLine) tempLine.remove();
        tempLine = L.polyline(points, { color: "yellow" }).addTo(map);
      });

      map.on("dblclick", () => (drawing = false));

      /* ================= WEBSOCKET API ================= */

      const socket = new WebSocket(
        "wss://" + window.location.hostname + ":8080"
      );

      socket.onmessage = function (event) {
        const msg = JSON.parse(event.data);

        if (msg.type === "INIT") {
          msg.payload.forEach(drawWarning);
        }

        if (msg.type === "NEW_WARNING") {
          drawWarning(msg.payload);
        }

        if (msg.type === "REMOVE_WARNING") {
          removeWarning(msg.id);
        }
      };

      function sendToServer(data) {
        socket.send(JSON.stringify(data));
      }

      const activeWarnings = {};

      function drawWarning(w) {
        const poly = L.polygon(w.points, {
          color: w.color,
          fillOpacity: 0.35,
        }).addTo(map);

        poly.bindPopup(`
    <b>${w.type}</b><br>
    <b>Hazard:</b> ${w.hazard}<br><br>
    ${w.desc}
  `);

        activeWarnings[w.id] = poly;

        if (w.expires) {
          const timeout = w.expires - Date.now();
          if (timeout > 0) {
            setTimeout(() => {
              sendToServer({ type: "REMOVE_WARNING", id: w.id });
            }, timeout);
          }
        }
      }

      function removeWarning(id) {
        if (activeWarnings[id]) {
          map.removeLayer(activeWarnings[id]);
          delete activeWarnings[id];
        }
      }

      /* ================= ISSUE FUNCTIONS ================= */

      function issueNWS() {
        if (points.length < 3) return alert("Draw polygon first.");

        const id = Date.now() + Math.random();
        const duration = parseInt(
          document.getElementById("warnDuration").value
        );

        sendToServer({
          type: "NEW_WARNING",
          payload: {
            id,
            type: warnTypeSelect.value,
            hazard: document.getElementById("hazardSelect").value,
            desc: document.getElementById("warnDesc").value,
            points,
            color: "red",
            expires: Date.now() + duration * 60000,
          },
        });

        points = [];
        if (tempLine) tempLine.remove();
      }

      function issueSPC() {
        if (points.length < 3) return alert("Draw polygon first.");

        const risk = document.getElementById("spcRisk").value;

        const colors = {
          TSTM: "green",
          Marginal: "lime",
          Slight: "yellow",
          Enhanced: "orange",
          Moderate: "red",
          High: "magenta",
        };

        sendToServer({
          type: "NEW_WARNING",
          payload: {
            id: Date.now() + Math.random(),
            type: `SPC ${risk} Risk`,
            hazard: risk,
            desc: document.getElementById("spcDesc").value,
            points,
            color: colors[risk],
            expires: null,
          },
        });

        points = [];
        if (tempLine) tempLine.remove();
      }
    </script>
  </body>
</html>
