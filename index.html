<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Live SPC + NWS Warning System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
      body {
        margin: 0;
        background: #0b0f14;
        color: white;
        font-family: Arial;
      }
      #map {
        position: absolute;
        inset: 0;
      }

      .sidebar {
        position: absolute;
        top: 15px;
        left: 15px;
        width: 420px;
        background: rgba(15, 20, 25, 0.97);
        padding: 18px;
        border-radius: 16px;
        z-index: 1000;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
        max-height: 90vh;
        overflow: auto;
      }

      .tabs button {
        width: 32%;
        margin-right: 4px;
        margin-bottom: 12px;
        background: #1c2733;
        color: #00bfff;
        border: none;
        padding: 8px;
        border-radius: 8px;
        cursor: pointer;
      }

      .tabs button.active {
        background: #0077ff;
        color: white;
      }

      .section {
        display: none;
      }
      .section.active {
        display: block;
      }

      h2 {
        color: #00bfff;
        margin-top: 0;
      }

      select,
      input,
      textarea,
      button {
        width: 100%;
        margin-bottom: 10px;
        padding: 8px;
        border-radius: 8px;
        border: none;
        background: #1c2733;
        color: white;
      }

      button {
        background: #0077ff;
        cursor: pointer;
      }
      button:hover {
        background: #0099ff;
      }
      .draw-btn {
        background: #444;
      }

      .warning-item {
        background: rgba(28, 39, 51, 0.8);
        margin: 5px 0;
        padding: 8px;
        border-radius: 6px;
        border-left: 4px solid;
      }

      .warning-extreme { border-left-color: red; }
      .warning-high { border-left-color: orange; }
      .warning-moderate { border-left-color: yellow; }
      .warning-low { border-left-color: green; }

      /* Radar marker styles */
      .radar-site-marker {
        background: rgba(0, 123, 255, 0.8);
        border-radius: 50%;
        border: 2px solid white;
        box-shadow: 0 0 10px rgba(0, 123, 255, 0.5);
        font-size: 20px;
        text-align: center;
        line-height: 26px;
      }

      .storm-cell-marker {
        background: rgba(255, 193, 7, 0.8);
        border-radius: 50%;
        border: 2px solid white;
        box-shadow: 0 0 8px rgba(255, 193, 7, 0.5);
        font-size: 18px;
        text-align: center;
        line-height: 21px;
      }

      .hail-marker {
        background: rgba(255, 140, 0, 0.8);
        border-radius: 50%;
        border: 2px solid white;
        box-shadow: 0 0 8px rgba(255, 140, 0, 0.5);
        font-size: 22px;
        text-align: center;
        line-height: 26px;
      }

      .rotation-marker {
        background: rgba(220, 53, 69, 0.8);
        border-radius: 50%;
        border: 2px solid white;
        box-shadow: 0 0 10px rgba(220, 53, 69, 0.5);
        font-size: 22px;
        text-align: center;
        line-height: 26px;
        animation: spin 2s linear infinite;
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .radar-warning-marker {
        background: rgba(220, 53, 69, 0.9);
        border-radius: 50%;
        border: 3px solid white;
        box-shadow: 0 0 15px rgba(220, 53, 69, 0.7);
        font-size: 24px;
        text-align: center;
        line-height: 29px;
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <div class="sidebar">
      <div style="margin-bottom: 10px; padding: 8px; background: rgba(0, 100, 200, 0.3); border-radius: 6px; font-size: 12px;">
        <span style="color: #ccc;">Connection: </span><span id="ws-status" style="color: #ffff00; font-weight: bold;">CONNECTING</span>
      </div>
      
      <div class="tabs">
        <button onclick="showTab('radar')" class="active">Radar</button>
        <button onclick="showTab('nws')">NWS</button>
        <button onclick="showTab('warnings')">Warnings</button>
        <button onclick="showTab('spc')">SPC</button>
      </div>

      <!-- RADAR -->
      <div id="radar" class="section active">
        <h2>Radar</h2>
        <select id="radarProduct">
          <option value="n0q">Base Reflectivity</option>
          <option value="n0u">Base Velocity</option>
          <option value="n0v">Base Spectrum Width</option>
          <option value="n0z">Base Differential Reflectivity (ZDR)</option>
          <option value="n0c">Base Correlation Coefficient (CC)</option>
          <option value="n0p">Base Differential Phase (PhiDP)</option>
          <option value="n0k">Base Specific Differential Phase (KDP)</option>
          <option value="echo">Echo Tops</option>
        </select>
        <select id="radarSite">
          <option value="KDMX">Des Moines, IA (KDMX)</option>
          <option value="KDVN">Davenport, IA (KDVN)</option>
          <option value="KFSD">Sioux Falls, SD (KFSD)</option>
          <option value="KMPX">Minneapolis, MN (KMPX)</option>
          <option value="KMKX">Milwaukee, WI (KMKX)</option>
        </select>
        <button onclick="loadDecodedRadar()">Load Decoded Data</button>
        <button onclick="clearRadarAnalysis()" style="background: #666; margin-left: 5px;">Clear Analysis</button>
        <div id="radarInfo" style="margin-top: 10px; font-size: 12px; color: #ccc;"></div>
      </div>

      <!-- NWS -->
      <div id="nws" class="section">
        <h2>NWS Warning Issuer</h2>

        <select id="warnType"></select>
        <select id="hazardSelect"></select>

        <textarea
          id="warnDesc"
          placeholder="Full Warning Description..."
        ></textarea>
        <input
          type="number"
          id="warnDuration"
          value="30"
          placeholder="Duration (min)"
        />

        <button class="draw-btn" onclick="startDrawing()">Draw Polygon</button>
        <button id="finishPolygonBtn" class="draw-btn" onclick="finishPolygon()" style="display: none;">Finish Polygon</button>
        <button onclick="issueNWS()">Issue Warning</button>
      </div>

      <!-- SPC -->
      <div id="spc" class="section">
        <h2>SPC Outlook Issuer</h2>

        <select id="spcRisk">
          <option>TSTM</option>
          <option>Marginal</option>
          <option>Slight</option>
          <option>Enhanced</option>
          <option>Moderate</option>
          <option>High</option>
        </select>

        <textarea id="spcDesc" placeholder="SPC Discussion Text..."></textarea>

        <button class="draw-btn" onclick="startDrawing()">
          Draw Risk Area
        </button>
        <button id="finishPolygonBtn2" class="draw-btn" onclick="finishPolygon()" style="display: none;">Finish Polygon</button>
        <button onclick="issueSPC()">Issue SPC Outlook</button>
      </div>

      <div id="warnings" class="section">
        <h2>Active Warnings</h2>
        <div id="warningList" style="max-height: 400px; overflow-y: auto;">
          <p>No active warnings</p>
        </div>
        <button onclick="clearAllWarnings()" style="background: #ff4444; margin-top: 10px;">Clear All Warnings</button>
        <button onclick="testAlert()" style="background: #ff8800; margin-top: 10px; margin-left: 10px;">Test Alert</button>
      </div>
    </div>

    <script>
      /* ================= MAP ================= */

      const map = L.map("map").setView([39, -95], 5);
      let mapInstance = map;

      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
      ).addTo(map);

      let radarLayer;
      let decodedRadarData = null;
      let analysisLayer;

      function loadRadar() {
        if (radarLayer) map.removeLayer(radarLayer);
        const product = document.getElementById("radarProduct").value;
        radarLayer = L.tileLayer(
          `https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/nexrad-${product}/{z}/{x}/{y}.png`
        ).addTo(map);
      }

      function loadDecodedRadar() {
        const site = document.getElementById("radarSite").value;
        const product = document.getElementById("radarProduct").value;

        document.getElementById("radarInfo").textContent = "Loading radar data...";

        socket.send(JSON.stringify({
          type: "REQUEST_RADAR",
          site: site,
          product: product
        }));
      }

      document.getElementById("radarProduct").onchange = loadRadar;
      document.getElementById("radarSite").onchange = () => {
        // Clear decoded data when site changes
        decodedRadarData = null;
        document.getElementById("radarInfo").textContent = "";
      };
      loadRadar();

      /* ================= TABS ================= */

      function showTab(id) {
        document
          .querySelectorAll(".section")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        document
          .querySelectorAll(".tabs button")
          .forEach((b) => b.classList.remove("active"));
        event.target.classList.add("active");
      }

      /* ================= HAZARD LOGIC ================= */

      const hazardMap = {
        "Tornado Warning": [
          "Large and Dangerous Tornado",
          "Confirmed Tornado",
          "Tornado Emergency",
        ],
        "Severe Thunderstorm Warning": [
          "80 MPH Winds",
          "Baseball Size Hail",
          "Considerable Damage",
        ],
        "Flash Flood Warning": [
          "Life Threatening Flooding",
          "Rapid Water Rise",
        ],
        "Winter Storm Warning": ["Heavy Snow", "Whiteout Conditions"],
        "Red Flag Warning": ["Extreme Fire Spread"],
        "Tornado Watch": ["Conditions Favorable for Tornadoes"],
        "Severe Thunderstorm Watch": ["Conditions Favorable for Severe Storms"],
        "Flash Flood Watch": ["Conditions Favorable for Flash Flooding"],
        "Winter Storm Watch": ["Conditions Favorable for Winter Storm"],
        "Heat Advisory": ["Dangerous Heat Index"],
        "Wind Advisory": ["Strong Wind Gusts"],
        "Flood Advisory": ["Minor Flooding"],
        "Freeze Warning": ["Sub-Freezing Temperatures"],
        "Blizzard Warning": ["Heavy Snow and Strong Winds"],
        "Hurricane Warning": ["Hurricane Conditions Expected"],
        "Tropical Storm Warning": ["Tropical Storm Conditions Expected"],
      };

      const warnTypeSelect = document.getElementById("warnType");
      Object.keys(hazardMap).forEach((type) => {
        let o = document.createElement("option");
        o.textContent = type;
        warnTypeSelect.appendChild(o);
      });

      function updateHazards() {
        const hazardSelect = document.getElementById("hazardSelect");
        hazardSelect.innerHTML = "";
        hazardMap[warnTypeSelect.value].forEach((h) => {
          let o = document.createElement("option");
          o.textContent = h;
          hazardSelect.appendChild(o);
        });
      }
      warnTypeSelect.onchange = updateHazards;
      updateHazards();

      /* ================= DRAW TOOL ================= */

      let drawing = false;
      let points = [];
      let tempLine;
      let finalPolygon = null;

      function startDrawing() {
        drawing = true;
        points = [];
        if (tempLine) tempLine.remove();
        if (finalPolygon) finalPolygon.remove();
        finalPolygon = null;
        document.getElementById("finishPolygonBtn").style.display = "inline-block";
        document.getElementById("finishPolygonBtn2").style.display = "inline-block";
        alert("Click map to add points. Click 'Finish Polygon' to complete.");
      }

      function finishPolygon() {
        if (!drawing || points.length < 3) {
          alert("Need at least 3 points to create a polygon.");
          return;
        }
        drawing = false;
        document.getElementById("finishPolygonBtn").style.display = "none";
        document.getElementById("finishPolygonBtn2").style.display = "none";
        if (tempLine) tempLine.remove();
        
        // Draw the final polygon on the map so it stays visible
        if (finalPolygon) finalPolygon.remove();
        finalPolygon = L.polygon(points, {
          color: "lime",
          fillOpacity: 0.3,
          weight: 2
        }).addTo(map);
      }

      map.on("click", (e) => {
        if (!drawing) return;
        points.push([e.latlng.lat, e.latlng.lng]);
        if (tempLine) tempLine.remove();
        tempLine = L.polyline(points, { color: "yellow" }).addTo(map);
      });

      /* ================= WEBSOCKET MANAGEMENT ================= */

      let socket = null;
      let wsRetryCount = 0;
      let wsRetryTimeout = null;
      let wsConnecting = false;

      function connectWebSocket() {
        // Already connected or connecting
        if (wsConnecting || (socket && socket.readyState === WebSocket.OPEN)) {
          return;
        }

        // Clear any pending retry
        if (wsRetryTimeout) {
          clearTimeout(wsRetryTimeout);
          wsRetryTimeout = null;
        }

        wsConnecting = true;
        
        // Build proper WebSocket URL using page's host/protocol
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const host = window.location.host; // includes port if not default
        const wsUrl = `${protocol}//${host}`;
        
        console.log(`[WS] Connecting to ${wsUrl}...`);
        updateConnectionStatus('connecting');

        try {
          socket = new WebSocket(wsUrl);
          
          socket.onopen = () => {
            wsConnecting = false;
            console.log('[WS] ✓ Connected');
            wsRetryCount = 0;
            updateConnectionStatus('connected');
            showNotification('Connected', 'Connected to server');
          };

          socket.onmessage = (event) => {
            try {
              const msg = JSON.parse(event.data);
              console.log('[WS] Received:', msg.type);
              
              if (msg.type === 'INIT' && msg.payload) {
                msg.payload.forEach(w => drawWarning(w));
              } else if (msg.type === 'NEW_WARNING' && msg.payload) {
                drawWarning(msg.payload);
              } else if (msg.type === 'REMOVE_WARNING') {
                removeWarning(msg.id);
              }
            } catch (err) {
              console.error('[WS] Message error:', err.message);
            }
          };

          socket.onerror = (err) => {
            wsConnecting = false;
            console.error('[WS] Error:', err.message || err.type);
            updateConnectionStatus('error');
          };

          socket.onclose = () => {
            wsConnecting = false;
            console.log('[WS] Closed');
            updateConnectionStatus('disconnected');
            
            // Reconnect after delay
            wsRetryCount++;
            if (wsRetryCount <= 10) {
              const delay = Math.min(1000 * Math.pow(1.5, wsRetryCount - 1), 30000);
              console.log(`[WS] Will retry in ${Math.round(delay)}ms (attempt ${wsRetryCount}/10)`);
              updateConnectionStatus('reconnecting', wsRetryCount);
              
              wsRetryTimeout = setTimeout(() => {
                wsRetryTimeout = null;
                connectWebSocket();
              }, delay);
            } else {
              console.error('[WS] Max retries exceeded');
              updateConnectionStatus('failed');
            }
          };
        } catch (err) {
          wsConnecting = false;
          console.error('[WS] Connection error:', err.message);
          updateConnectionStatus('error');
          
          // Retry
          wsRetryCount++;
          if (wsRetryCount <= 10) {
            const delay = 2000;
            console.log(`[WS] Retrying in ${delay}ms...`);
            updateConnectionStatus('reconnecting', wsRetryCount);
            
            wsRetryTimeout = setTimeout(() => {
              wsRetryTimeout = null;
              connectWebSocket();
            }, delay);
          }
        }
      }

      function updateConnectionStatus(status, retryCount) {
        const el = document.getElementById('ws-status');
        if (!el) {
          console.warn('[WS] Status element not found');
          return;
        }

        const colors = {
          'connected': '#0f0',
          'connecting': '#ff0',
          'reconnecting': '#f80',
          'disconnected': '#f00',
          'error': '#f00',
          'failed': '#800'
        };

        try {
          let text = status.charAt(0).toUpperCase() + status.slice(1);
          if (retryCount) text += ` (${retryCount}/10)`;

          el.textContent = text;
          el.style.color = colors[status] || '#fff';
        } catch (err) {
          console.error('[WS] Failed to update status:', err.message);
        }
      }

      function sendWarning(data) {
        // Check socket state
        if (!socket) {
          console.error('[WS] Socket not initialized');
          showNotification('Connection Error', 'Socket not initialized - try refreshing the page');
          return false;
        }

        const states = {
          0: 'CONNECTING',
          1: 'OPEN',
          2: 'CLOSING',
          3: 'CLOSED'
        };

        const currentState = states[socket.readyState] || 'UNKNOWN';
        console.log(`[WS] Socket state: ${socket.readyState} (${currentState})`);

        if (socket.readyState !== WebSocket.OPEN) {
          console.error(`[WS] Cannot send - socket state is ${currentState} (need OPEN)`);
          showNotification('Connection Error', `Socket is ${currentState.toLowerCase()} - cannot send warning`);
          return false;
        }

        try {
          socket.send(JSON.stringify(data));
          console.log('[WS] ✓ Sent:', data.type);
          return true;
        } catch (err) {
          console.error('[WS] ✗ Send failed:', err.message);
          showNotification('Send Error', err.message);
          return false;
        }
      }

      // Auto-connect on page load
      document.addEventListener('DOMContentLoaded', () => {
        connectWebSocket();
      });

      /* ================= WARNING MANAGEMENT ================= */

      const activeWarnings = {};

      function drawWarning(w) {
        try {
          console.log('[drawWarning] ID:', w.id, 'Type:', w.type, 'Points:', w.points?.length);

          if (!map) {
            console.error('[drawWarning] Map not initialized yet');
            return;
          }

          if (!w || !w.id) {
            console.error('[drawWarning] Invalid: no ID');
            return;
          }

          if (!w.points || !Array.isArray(w.points) || w.points.length < 3) {
            console.error('[drawWarning] Invalid points');
            return;
          }

          // Don't redraw if already exists
          if (activeWarnings[w.id]) {
            console.log('[drawWarning] Already on map');
            return;
          }

          const poly = L.polygon(w.points, {
            color: w.color || 'red',
            fillColor: w.color || 'red',
            fillOpacity: 0.35,
            weight: 3,
            warningData: w
          }).addTo(map);

          poly.bringToFront();

          poly.bindPopup(`
            <b style="color: ${w.color}">${w.type}</b><br>
            <b>Hazard:</b> ${w.hazard}<br>
            ${w.desc ? `<b>Description:</b> ${w.desc}<br>` : ''}
            ${w.expires ? `<b>Expires:</b> ${new Date(w.expires).toLocaleTimeString()}<br>` : ''}
          `);

          activeWarnings[w.id] = poly;
          updateWarningList();
          console.log('[drawWarning] ✓ Added');
        } catch (err) {
          console.error('[drawWarning] Exception:', err.message);
        }
      }

      function removeWarning(id) {
        console.log('[removeWarning]', id);
        if (activeWarnings[id]) {
          map.removeLayer(activeWarnings[id]);
          delete activeWarnings[id];
          updateWarningList();
          sendWarning({ type: 'REMOVE_WARNING', id });
        }
      }

      function updateWarningList() {
        const list = document.getElementById('warningList');
        if (!list) return;

        const ids = Object.keys(activeWarnings);
        if (ids.length === 0) {
          list.innerHTML = '<p>No active warnings</p>';
          return;
        }

        list.innerHTML = ids.map(id => {
          const poly = activeWarnings[id];
          const w = poly.options.warningData;
          return `
            <div class="warning-item" style="border-left-color: ${w.color}">
              <div>
                <b>${w.type}</b><br>
                <small>${w.hazard}</small>
              </div>
              <button onclick="removeWarning('${w.id}')" 
                style="float:right; bg:#f44; color:#fff; border:0; padding:2px 6px; border-radius:3px; cursor:pointer; font-size:11px;">
                ✕
              </button>
            </div>
          `;
        }).join('');
      }

      function clearAllWarnings() {
        Object.keys(activeWarnings).forEach(id => removeWarning(id));
      }

      function displayRadarInfo(data) {
        if (!data) {
          document.getElementById("radarInfo").textContent = "No radar data available";
          return;
        }

        const info = document.getElementById("radarInfo");
        let html = `
          <strong>${data.productInfo.name}</strong><br>
          Site: ${data.site}<br>
          Generated: ${new Date(data.timestamp).toLocaleTimeString()}<br>
          <strong>Statistics:</strong><br>
          Mean: ${data.statistics.mean.toFixed(1)} ${data.productInfo.unit}<br>
          Max: ${data.statistics.max.toFixed(1)} ${data.productInfo.unit}<br>
          Min: ${data.statistics.min.toFixed(1)} ${data.productInfo.unit}<br>
          Coverage: ${data.statistics.coverage.toFixed(1)}%<br>
        `;

        if (data.analysis) {
          html += `<strong>Analysis:</strong><br>`;

          if (data.analysis.maxReflectivity) {
            html += `Max Reflectivity: ${data.analysis.maxReflectivity.toFixed(1)} dBZ<br>`;
          }
          if (data.analysis.maxVelocity) {
            html += `Max Velocity: ${data.analysis.maxVelocity.toFixed(1)} knots<br>`;
          }
          if (data.analysis.stormCells) {
            html += `Storm Cells: ${data.analysis.stormCells}<br>`;
          }
          if (data.analysis.rotationDetected) {
            html += `<span style="color: red;">⚠️ Rotation Detected</span><br>`;
          }
          if (data.analysis.hailPotential) {
            html += `<span style="color: orange;">⚠️ Hail Potential</span><br>`;
          }
          if (data.analysis.precipitationType) {
            html += `Precipitation: ${data.analysis.precipitationType}<br>`;
          }

          if (data.analysis.features && data.analysis.features.length > 0) {
            html += `Features: ${data.analysis.features.join(', ')}<br>`;
          }
        }

        // Check for severe weather threats
        const threats = data.threats || [];
        if (threats.length > 0) {
          html += `<strong style="color: red;">⚠️ THREATS DETECTED:</strong><br>`;
          threats.forEach(threat => {
            html += `<span style="color: red;">• ${threat}</span><br>`;
          });
        }

        info.innerHTML = html;

        // Auto-issue warnings for severe radar threats
        if (data.threats && data.threats.length > 0) {
          data.threats.forEach(threat => {
            autoIssueRadarWarning(threat, data);
          });
        }
      }

      function displayRadarOnMap(data) {
        // Clear previous analysis layer
        if (analysisLayer) {
          map.removeLayer(analysisLayer);
        }

        analysisLayer = L.layerGroup().addTo(map);

        // Ensure warnings stay on top
        Object.values(activeWarnings).forEach(warning => {
          if (warning && map.hasLayer(warning)) {
            warning.bringToFront();
          }
        });

        // Get radar site location (approximate coordinates for major sites)
        const siteCoords = getRadarSiteCoords(data.site);

        if (siteCoords) {
          // Add radar site marker
          L.marker(siteCoords, {
            icon: L.divIcon({
              className: 'radar-site-marker',
              html: '📡',
              iconSize: [30, 30],
              iconAnchor: [15, 15]
            })
          }).addTo(analysisLayer).bindPopup(`<b>${data.site} Radar</b><br>${data.productInfo.name}`);

          // Add analysis overlays based on data
          if (data.analysis) {
            // Add storm cell markers if detected
            if (data.analysis.stormCells && data.analysis.stormCells > 0) {
              for (let i = 0; i < data.analysis.stormCells; i++) {
                const offsetLat = (Math.random() - 0.5) * 2; // Random offset within ~100 miles
                const offsetLng = (Math.random() - 0.5) * 2;

                const stormLat = siteCoords[0] + offsetLat;
                const stormLng = siteCoords[1] + offsetLng;

                L.marker([stormLat, stormLng], {
                  icon: L.divIcon({
                    className: 'storm-cell-marker',
                    html: '⛈️',
                    iconSize: [25, 25],
                    iconAnchor: [12, 12]
                  })
                }).addTo(analysisLayer).bindPopup(`<b>Storm Cell ${i + 1}</b><br>Detected by ${data.productInfo.name}`);
              }
            }

            // Add severe weather warning circles
            if (data.threats && data.threats.length > 0) {
              data.threats.forEach((threat, index) => {
                const threatLat = siteCoords[0] + (Math.random() - 0.5) * 1.5;
                const threatLng = siteCoords[1] + (Math.random() - 0.5) * 1.5;

                // Create warning polygon based on threat type
                const warningColor = getWarningColorFromThreat(threat);
                const warningPoints = generateWarningPolygon([threatLat, threatLng], 0.5); // 0.5 degree radius

                L.polygon(warningPoints, {
                  color: warningColor,
                  fillColor: warningColor,
                  fillOpacity: 0.4,
                  weight: 3,
                  opacity: 0.8
                }).addTo(analysisLayer).bindPopup(`
                  <b style="color: ${warningColor};">⚠️ RADAR WARNING</b><br>
                  <strong>${threat}</strong><br>
                  <em>Detected by ${data.productInfo.name}</em><br>
                  <small>Auto-generated from radar analysis</small>
                `);

                // Add warning icon
                L.marker([threatLat, threatLng], {
                  icon: L.divIcon({
                    className: 'radar-warning-marker',
                    html: getWarningIcon(threat),
                    iconSize: [35, 35],
                    iconAnchor: [17, 17]
                  })
                }).addTo(analysisLayer);
              });
            }

            // Add hail potential indicators
            if (data.analysis.hailPotential) {
              const hailLat = siteCoords[0] + (Math.random() - 0.5) * 1;
              const hailLng = siteCoords[1] + (Math.random() - 0.5) * 1;

              L.marker([hailLat, hailLng], {
                icon: L.divIcon({
                  className: 'hail-marker',
                  html: '🌨️',
                  iconSize: [30, 30],
                  iconAnchor: [15, 15]
                })
              }).addTo(analysisLayer).bindPopup(`<b style="color: orange;">⚠️ Hail Potential</b><br>Detected by ${data.productInfo.name}`);
            }

            // Add rotation indicators
            if (data.analysis.rotationDetected) {
              const rotationLat = siteCoords[0] + (Math.random() - 0.5) * 1.2;
              const rotationLng = siteCoords[1] + (Math.random() - 0.5) * 1.2;

              L.marker([rotationLat, rotationLng], {
                icon: L.divIcon({
                  className: 'rotation-marker',
                  html: '🌀',
                  iconSize: [30, 30],
                  iconAnchor: [15, 15]
                })
              }).addTo(analysisLayer).bindPopup(`<b style="color: red;">⚠️ Rotation Detected</b><br>Possible tornado formation<br>Detected by ${data.productInfo.name}`);
            }
          }

          // Add coverage area circle (approximate radar range)
          L.circle(siteCoords, {
            color: 'blue',
            fillColor: 'blue',
            fillOpacity: 0.1,
            radius: 230000, // ~230km range
            weight: 2,
            dashArray: '5, 5'
          }).addTo(analysisLayer).bindPopup(`<b>${data.site} Radar Coverage</b><br>Approximate range: 230km`);
        }
      }

      function detectSevereWeather(data) {
        // Simple severe weather detection algorithm
        const threats = [];

        if (data.product === 'n0q' && data.analysis && data.analysis.maxReflectivity > 45) {
          threats.push('Severe thunderstorm potential');
        }

        if (data.product === 'n0u' && data.analysis && data.analysis.rotationDetected) {
          threats.push('Rotation detected - possible tornado');
        }

        if (data.product === 'n0z' && data.analysis && data.analysis.hailPotential) {
          threats.push('Hail potential detected');
        }

        return threats;
      }

      function playAlertSound(type) {
        // Create audio context for alert sounds
        try {
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioContext.createOscillator();
          const gainNode = audioContext.createGain();

          oscillator.connect(gainNode);
          gainNode.connect(audioContext.destination);

          // Different sounds for different alert types
          switch(type) {
            case 'tornado':
              oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
              oscillator.frequency.setValueAtTime(600, audioContext.currentTime + 0.1);
              break;
            case 'severe':
              oscillator.frequency.setValueAtTime(1000, audioContext.currentTime);
              oscillator.frequency.setValueAtTime(800, audioContext.currentTime + 0.1);
              break;
            case 'warning':
            default:
              oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
              break;
          }

          gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

          oscillator.start(audioContext.currentTime);
          oscillator.stop(audioContext.currentTime + 0.5);
        } catch (e) {
          console.log('Audio not supported');
        }
      }

      function showNotification(title, message) {
        // Browser notification
        if ('Notification' in window && Notification.permission === 'granted') {
          new Notification(title, { body: message, icon: '/favicon.ico' });
        } else if ('Notification' in window && Notification.permission !== 'denied') {
          Notification.requestPermission().then(permission => {
            if (permission === 'granted') {
              new Notification(title, { body: message });
            }
          });
        }

        // Also show in console
        console.warn(`${title}: ${message}`);
      }

      function getWarningColorFromThreat(threat) {
        if (threat.includes('tornado')) return 'red';
        if (threat.includes('Severe thunderstorm')) return 'orange';
        if (threat.includes('hail')) return 'orange';
        if (threat.includes('flood')) return 'purple';
        if (threat.includes('heavy precipitation')) return 'blue';
        return 'yellow';
      }

      function getWarningIcon(threat) {
        if (threat.includes('tornado')) return '🌪️';
        if (threat.includes('rotation')) return '🌀';
        if (threat.includes('hail')) return '🌨️';
        if (threat.includes('thunderstorm')) return '⛈️';
        if (threat.includes('flood')) return '🌊';
        return '⚠️';
      }

      function generateWarningPolygon(center, radiusDegrees) {
        // Generate a hexagonal warning polygon around the center point
        const points = [];
        const sides = 6;
        const angleStep = (2 * Math.PI) / sides;

        for (let i = 0; i < sides; i++) {
          const angle = i * angleStep;
          const lat = center[0] + radiusDegrees * Math.cos(angle);
          const lng = center[1] + radiusDegrees * Math.sin(angle);
          points.push([lat, lng]);
        }

        return points;
      }

      function autoIssueRadarWarning(threat, radarData) {
        // Only auto-issue for extreme threats
        if (!threat.includes('tornado') && !threat.includes('Severe thunderstorm')) {
          return;
        }

        const siteCoords = getRadarSiteCoords(radarData.site);
        if (!siteCoords) return;

        // Generate warning polygon around the radar site
        const warningPoints = generateWarningPolygon(siteCoords, 1.0); // 1 degree radius

        const id = `radar_${radarData.site}_${Date.now()}_${Math.random()}`;
        const warningType = threat.includes('tornado') ? 'Tornado Warning' : 'Severe Thunderstorm Warning';
        const warningColor = getWarningColorFromThreat(threat);

        sendToServer({
          type: "NEW_WARNING",
          payload: {
            id,
            type: `Radar-Detected ${warningType}`,
            hazard: threat,
            desc: `Automatically issued based on ${radarData.productInfo.name} analysis from ${radarData.site} radar.`,
            points: warningPoints,
            color: warningColor,
            expires: Date.now() + 1800000, // 30 minutes
            priority: threat.includes('tornado') ? 'extreme' : 'high',
            source: 'radar'
          },
        });
      }

      async function fetchWarningsFromAPI() {
        try {
          const response = await fetch('/warnings');
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          const data = await response.json();
          console.log('[API] Fetched warnings:', data.warnings.length);

          // Clear existing warnings and re-draw from API
          Object.keys(activeWarnings).forEach(id => {
            if (activeWarnings[id]) {
              map.removeLayer(activeWarnings[id]);
            }
          });
          activeWarnings = {};

          // Draw warnings from API
          data.warnings.forEach(warning => {
            drawWarning(warning);
          });

          updateWarningList();
        } catch (error) {
          console.error('[API] Error fetching warnings:', error);
        }
      }
